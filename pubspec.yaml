name: appa
description: "Medication reminder app for elderly users with caregiver support."
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Storage
  shared_preferences: ^2.3.0

  # Features
  flutter_tts: ^4.0.2
  file_picker: ^8.0.0
  intl: ^0.19.0
  permission_handler: ^12.0.1

  # Camera & Networking
  camera: ^0.11.2+1
  http: ^1.2.0
  image_picker: ^1.1.2

  # TensorFlow Lite
  tflite_flutter: ^0.11.0
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/tablet_classifier.tflite
    - assets/models/labels.txt